workflows:

  # ─────────────────────────────────────────────
  # PR Validation — corre en cada PR hacia main
  # ─────────────────────────────────────────────
  #
  # Variables requeridas en Codemagic UI
  # (App Settings > Environment variables):
  #
  #   Nombre                  Tipo       Descripción
  #   ──────────────────────  ─────────  ─────────────────────────────────────
  #   MR_API_KEY              Secret     API key del backend Multiriesgos
  #   FIREBASE_OPTIONS_DART   Secret     base64 de lib/firebase_options.dart
  #   GOOGLE_SERVICES_JSON    Secret     base64 de android/app/google-services.json
  #   GOOGLE_SERVICE_INFO_PLIST Secret   base64 de ios/Runner/GoogleService-Info.plist
  #   GPLAY_SERVICE_ACCOUNT   Secret     JSON del service account de Google Play
  # ─────────────────────────────────────────────
  pr-validation:
    name: PR Validation
    max_build_duration: 20
    instance_type: mac_mini_m1
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: false   # source:false = rama BASE del PR
      cancel_previous_builds: true
    environment:
      flutter: stable
      groups:
        - secure
    scripts:
      - name: Restaurar archivos Firebase
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Unit tests with coverage
        script: flutter test --coverage
      - name: Coverage threshold gate
        script: |
          awk -v threshold=75 '
            /^LF:/ { found += substr($0, 4) }
            /^LH:/ { hit   += substr($0, 4) }
            END {
              pct = (found > 0) ? (100.0 * hit / found) : 0
              printf "Cobertura total: %.1f%% (%d/%d líneas), umbral mínimo: %d%%\n", pct, hit, found, threshold
              if (pct < threshold) {
                print "ERROR: la cobertura de tests bajó del umbral mínimo."
                exit 1
              }
            }
          ' coverage/lcov.info
    artifacts:
      - coverage/lcov.info
    publishing:
      email:
        recipients:
          - desarrollo@multiriesgos.com
        notify:
          success: false
          failure: true

  # ─────────────────────────────────────────────
  # iOS Release → TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - secure
    scripts:
      - name: Clean build cache
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Get Flutter packages
        script: flutter pub get
      - name: Restaurar archivos Firebase iOS
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
          test -s ios/Runner/GoogleService-Info.plist \
            || { echo "ERROR: GOOGLE_SERVICE_INFO_PLIST vacío o no configurado en Codemagic"; exit 1; }
      - name: Set up iOS signing
        script: |
          keychain initialize

          echo "=== [1] Descargando archivos de firma ==="
          app-store-connect fetch-signing-files com.multiriesgos.multimate \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERT_PRIVATE_KEY \
            --verbose || exit 1

          keychain add-certificates

          echo "=== [2] Localizando provisioning profile ==="
          FETCH_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          PROFILE_FILE=$(find "$FETCH_DIR" -name "*.mobileprovision" 2>/dev/null | head -1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "ERROR: No hay .mobileprovision en $FETCH_DIR"
            exit 1
          fi
          security cms -D -i "$PROFILE_FILE" > /tmp/profile.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist 2>/dev/null)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist 2>/dev/null)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /tmp/profile.plist 2>/dev/null)
          echo "Perfil: $PROFILE_NAME  UUID: $PROFILE_UUID  Team: $TEAM_ID"

          echo "=== [3] Verificando aps-environment ==="
          if ! /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" /tmp/profile.plist 2>/dev/null | grep -q .; then
            echo "ERROR: aps-environment AUSENTE en perfil '$PROFILE_NAME'"
            echo "Solución: Eliminar perfil en developer.apple.com → Profiles y relanzar."
            exit 1
          fi
          echo "aps-environment: ✓"

          echo "=== [4] Inyectando firma en Release.xcconfig (solo Runner target) ==="
          # NO usamos xcode-project use-profiles porque modifica el proyecto a nivel global
          # y Xcode 26 lo propaga a SPM packages (Firebase, nanopb, etc.) que no soportan perfiles.
          # Release.xcconfig solo aplica al target Runner, nunca a targets SPM.
          {
            printf '\n// Code signing — inyectado por Codemagic CI\n'
            printf 'CODE_SIGN_STYLE = Manual\n'
            printf 'CODE_SIGN_IDENTITY = Apple Distribution\n'
            printf 'PROVISIONING_PROFILE_SPECIFIER = %s\n' "$PROFILE_NAME"
            printf 'DEVELOPMENT_TEAM = %s\n' "$TEAM_ID"
          } >> ios/Flutter/Release.xcconfig
          echo "Release.xcconfig final:"
          cat ios/Flutter/Release.xcconfig

          echo "=== [5] Generando ExportOptions.plist ==="
          cat > /tmp/ExportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.multiriesgos.multimate</key>
                  <string>$PROFILE_NAME</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLISTEOF
          echo "ExportOptions.plist:"
          cat /tmp/ExportOptions.plist

          echo "=== [6] Certificados en keychain ==="
          security find-identity -v -p codesigning 2>/dev/null | head -5 \
            || echo "Sin certificados de firma"
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --dart-define=MR_API_KEY=$MR_API_KEY \
            --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - '*.snap'
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─────────────────────────────────────────────
  # Android Release → Play Store Internal
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - secure
      android_signing:
        - multiriesgos_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Restaurar archivos Firebase Android
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
          test -s android/app/google-services.json \
            || { echo "ERROR: GOOGLE_SERVICES_JSON vacío o no configurado en Codemagic"; exit 1; }
      - name: Set up Android signing
        script: |
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Build AAB
        script: |
          flutter build aab --release \
            --dart-define=MR_API_KEY=$MR_API_KEY
      - name: Build APK (split per ABI — para pruebas internas)
        script: |
          flutter build apk --release --split-per-abi \
            --dart-define=MR_API_KEY=$MR_API_KEY
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/mapping/release/mapping.txt
    # publishing:           # Desactivado hasta configurar vínculo Google Cloud → Play Console
    #   google_play:
    #     credentials: $GPLAY_SERVICE_ACCOUNT
    #     track: internal
