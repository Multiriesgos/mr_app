workflows:

  # ─────────────────────────────────────────────
  # PR Validation — corre en cada PR hacia main
  # ─────────────────────────────────────────────
  #
  # Environment Files requeridos en Codemagic UI
  # (Team Settings > Global variables and secrets > Files):
  #
  #   Identifier              Destination path
  #   ──────────────────────  ─────────────────────────────────────
  #   FIREBASE_OPTIONS_DART   lib/firebase_options.dart
  #   GOOGLE_SERVICES_JSON    android/app/google-services.json  (solo android-release)
  #   GOOGLE_SERVICE_INFO_PLIST  ios/Runner/GoogleService-Info.plist  (solo ios-release)
  #
  # Codemagic copia el archivo a la destination path antes de que corran los scripts.
  # ─────────────────────────────────────────────
  pr-validation:
    name: PR Validation
    max_build_duration: 20
    instance_type: linux_x2
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: false   # source:false = rama BASE del PR
      cancel_previous_builds: true
    environment:
      flutter: stable
      vars:
        MR_API_KEY: Encrypted(...)
    scripts:
      - name: Verificar archivos Firebase
        script: |
          test -f lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART no configurado en Codemagic Environment Files"; exit 1; }
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Unit tests with coverage
        script: flutter test --coverage
    artifacts:
      - coverage/lcov.info
    publishing:
      email:
        recipients:
          - desarrollo@multiriesgos.com
        notify:
          success: false
          failure: true

  # ─────────────────────────────────────────────
  # iOS Release → TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Multiriesgos
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.multiriesgos.multimate
      vars:
        MR_API_KEY: Encrypted(...)
    scripts:
      - name: Clean build cache
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Verificar archivos Firebase iOS
        script: |
          test -f lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART no configurado en Codemagic Environment Files"; exit 1; }
          test -f ios/Runner/GoogleService-Info.plist \
            || { echo "ERROR: GOOGLE_SERVICE_INFO_PLIST no configurado en Codemagic Environment Files"; exit 1; }
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --no-pub \
            --dart-define=MR_API_KEY=$MR_API_KEY
      # dSYMs se suben automáticamente por el plugin firebase-crashlytics-gradle
    artifacts:
      - build/ios/ipa/*.ipa
      - '*.snap'
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─────────────────────────────────────────────
  # Android Release → Play Store Internal
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      android_signing:
        - multiriesgos_keystore
      vars:
        MR_API_KEY: Encrypted(...)
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Verificar archivos Firebase Android
        script: |
          test -f lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART no configurado en Codemagic Environment Files"; exit 1; }
          test -f android/app/google-services.json \
            || { echo "ERROR: GOOGLE_SERVICES_JSON no configurado en Codemagic Environment Files"; exit 1; }
      - name: Build AAB
        script: |
          flutter build aab --release \
            --dart-define=MR_API_KEY=$MR_API_KEY
      # Mapping + dSYMs se suben automáticamente por el plugin firebase-crashlytics-gradle
      - name: Build APK (split per ABI — para pruebas internas)
        script: |
          flutter build apk --release --split-per-abi \
            --dart-define=MR_API_KEY=$MR_API_KEY
      # T4.1c — Symbols upload (activar cuando se configure T4.2 crash reporting)
      # - name: Upload mapping.txt to crash reporter
      #   script: |
      #     # Sentry:
      #     # sentry-cli upload-dif --org YOUR_ORG --project mr-app \
      #     #   build/app/outputs/mapping/release/mapping.txt
      #     echo "Symbols upload: configure T4.2 first"
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/apk/release/*.apk
      # ProGuard mapping para deobfuscar stack traces (T4.2)
      - build/app/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: Encrypted(...)
        track: internal
