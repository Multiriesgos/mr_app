workflows:

  # ─────────────────────────────────────────────
  # PR Validation — corre en cada PR hacia main
  # ─────────────────────────────────────────────
  #
  # Variables requeridas en Codemagic UI
  # (App Settings > Environment variables):
  #
  #   Nombre                  Tipo       Descripción
  #   ──────────────────────  ─────────  ─────────────────────────────────────
  #   MR_API_KEY              Secret     API key del backend Multiriesgos
  #   FIREBASE_OPTIONS_DART   Secret     base64 de lib/firebase_options.dart
  #   GOOGLE_SERVICES_JSON    Secret     base64 de android/app/google-services.json
  #   GOOGLE_SERVICE_INFO_PLIST Secret   base64 de ios/Runner/GoogleService-Info.plist
  #   GPLAY_SERVICE_ACCOUNT   Secret     JSON del service account de Google Play
  # ─────────────────────────────────────────────
  pr-validation:
    name: PR Validation
    max_build_duration: 20
    instance_type: mac_mini_m1
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: false   # source:false = rama BASE del PR
      cancel_previous_builds: true
    environment:
      flutter: stable
      groups:
        - secure
    scripts:
      - name: Restaurar archivos Firebase
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Unit tests with coverage
        script: flutter test --coverage
    artifacts:
      - coverage/lcov.info
    publishing:
      email:
        recipients:
          - desarrollo@multiriesgos.com
        notify:
          success: false
          failure: true

  # ─────────────────────────────────────────────
  # iOS Release → TestFlight
  # ─────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - secure
    scripts:
      - name: Clean build cache
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
      - name: Get Flutter packages
        script: flutter pub get
      - name: Restaurar archivos Firebase iOS
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
          test -s ios/Runner/GoogleService-Info.plist \
            || { echo "ERROR: GOOGLE_SERVICE_INFO_PLIST vacío o no configurado en Codemagic"; exit 1; }
      - name: Set up iOS signing
        script: |
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          keychain initialize
          keychain add-certificates

          echo "=== [1] Descargando archivos de firma ==="
          app-store-connect fetch-signing-files com.multiriesgos.multimate \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @env:CERT_PRIVATE_KEY \
            --verbose || exit 1

          echo "=== [2] Perfiles en $PROFILES_DIR ==="
          ls -la "$PROFILES_DIR/" 2>/dev/null || echo "VACÍO — no se descargaron perfiles"

          echo "=== [3] Inspeccionando capabilities del perfil ==="
          FOUND=0
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            FOUND=1
            PDATA=$(security cms -D -i "$f" 2>/dev/null)
            PNAME=$(echo "$PDATA" | /usr/libexec/PlistBuddy -c "Print Name" /dev/stdin 2>/dev/null || echo "?")
            echo "Perfil: $PNAME  ($f)"
            if echo "$PDATA" | /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" /dev/stdin 2>/dev/null | grep -q .; then
              echo "  aps-environment: ✓  (Push Notifications incluido)"
            else
              echo "  aps-environment: ✗  (Push Notifications AUSENTE)"
              echo "  SOLUCIÓN: Eliminar este perfil en developer.apple.com → Profiles"
              echo "  y re-ejecutar el build (--create generará uno nuevo con la capability)."
            fi
          done
          [ "$FOUND" -eq 0 ] && { echo "ERROR: No se encontró ningún .mobileprovision — fetch-signing-files falló"; exit 1; }

          xcode-project use-profiles

          echo "=== [4] Certificados en keychain ==="
          security find-identity -v -p codesigning 2>/dev/null | head -5 \
            || echo "Sin certificados de firma"
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Build IPA
        script: |
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          SYSTEM_PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$SYSTEM_PROFILES_DIR"

          # 1. Compilar sin firma — Flutter ejecuta sus migraciones de Xcode
          flutter build ios --release \
            --no-codesign \
            --dart-define=MR_API_KEY=$MR_API_KEY

          # 2. Buscar el perfil descargado
          PROFILE_FILE=$(find "$PROFILES_DIR" -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE_FILE" ]; then
            echo "ERROR: No hay provisioning profiles en $PROFILES_DIR"
            echo "Revisa el paso 'Set up iOS signing' para diagnosticar fetch-signing-files."
            exit 1
          fi

          PROFILE_PLIST=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null)
          PROFILE_NAME=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print Name" /dev/stdin)
          PROFILE_UUID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin)
          TEAM_ID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin 2>/dev/null || echo "A2H3V99998")
          echo "Perfil: $PROFILE_NAME  UUID: $PROFILE_UUID  Team: $TEAM_ID"

          # 3. Verificar aps-environment antes de archivar
          if ! echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" /dev/stdin 2>/dev/null | grep -q .; then
            echo "ERROR: El perfil '$PROFILE_NAME' no tiene aps-environment."
            echo "Elimina el perfil en developer.apple.com → Profiles y re-ejecuta el build."
            exit 1
          fi
          echo "aps-environment: ✓"

          # 4. Generar ExportOptions.plist con formato dict correcto (no array)
          cat > /tmp/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.multiriesgos.multimate</key>
                  <string>$PROFILE_NAME</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          PLIST
          echo "=== ExportOptions.plist ==="
          cat /tmp/export_options.plist

          # 5. Instalar perfil en ubicación estándar de Xcode (requerido por xcodebuild)
          cp "$PROFILE_FILE" "$SYSTEM_PROFILES_DIR/${PROFILE_UUID}.mobileprovision"

          # 6. Archivar con signing manual explícito
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

          # 7. Exportar IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/Runner.xcarchive/Products/Applications/*.app
      - '*.snap'
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─────────────────────────────────────────────
  # Android Release → Play Store Internal
  # ─────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - secure
      android_signing:
        - multiriesgos_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Restaurar archivos Firebase Android
        script: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          test -s lib/firebase_options.dart \
            || { echo "ERROR: FIREBASE_OPTIONS_DART vacío o no configurado en Codemagic"; exit 1; }
          test -s android/app/google-services.json \
            || { echo "ERROR: GOOGLE_SERVICES_JSON vacío o no configurado en Codemagic"; exit 1; }
      - name: Set up Android signing
        script: |
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Analyze
        script: flutter analyze --fatal-warnings
      - name: Test
        script: flutter test
      - name: Build AAB
        script: |
          flutter build aab --release \
            --dart-define=MR_API_KEY=$MR_API_KEY
      - name: Build APK (split per ABI — para pruebas internas)
        script: |
          flutter build apk --release --split-per-abi \
            --dart-define=MR_API_KEY=$MR_API_KEY
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/apk/release/*.apk
      - build/app/outputs/mapping/release/mapping.txt
    # publishing:           # Desactivado hasta configurar vínculo Google Cloud → Play Console
    #   google_play:
    #     credentials: $GPLAY_SERVICE_ACCOUNT
    #     track: internal
