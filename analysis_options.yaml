include: package:very_good_analysis/analysis_options.6.0.0.yaml

analyzer:
  exclude:
    # Generated files
    - lib/generated_plugin_registrant.dart
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    # Generated by FlutterFire CLI — not manually maintained
    - lib/firebase_options.dart
    # Legacy files not used in modern code (pending deletion)
    - lib/app_theme.dart
    - lib/circle_painter.dart
    - lib/curve_wave.dart

linter:
  rules:
    prefer_single_quotes: true
    avoid_print: true
    # App interna, no librería pública — documentar cada miembro no aplica
    public_member_api_docs: false
    # Límite de 80 chars es obsoleto para proyectos modernos
    lines_longer_than_80_chars: false
    # Opinionado, no afecta calidad del código
    sort_constructors_first: false
    # Patrón válido en Clean Architecture (interfaces de repositorios)
    one_member_abstracts: false
    # API privada interna — named params no aportan aquí
    avoid_positional_boolean_parameters: false
